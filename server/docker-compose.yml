services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: douhui
      POSTGRES_USER: douhui
      POSTGRES_PASSWORD: douhui
    ports:
      - "5432:5432"
    volumes:
      - douhui_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douhui -d douhui"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  douhui_postgres:
