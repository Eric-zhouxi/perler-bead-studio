<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="使用 MARD 221 或 291 标准色号将图片转换为可导出的拼豆图纸。" />
    <title>豆绘 · MARD 拼豆图纸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="#"><span class="brand-mark">◈</span>豆绘<span>PERLER STUDIO</span></a>
        <div class="top-actions"><button class="icon-button" id="clearBtn" aria-label="清空画布" data-tooltip="清空画布"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button><button class="primary-button" id="saveBtn">导出图纸</button></div>
      </header>

      <section class="hero">
        <div><p class="eyebrow">MAKE IT PIXEL, MAKE IT YOURS</p><h1>把灵感，拼成一颗颗<br/><em>小小的彩色豆子。</em></h1></div>
        <p class="intro">上传喜欢的图片自动转为拼豆图纸，或从空白画布开始创作。每一格，都由你决定。</p>
      </section>

      <section class="mode-tabs" aria-label="创作模式">
        <button class="mode active" data-mode="image"><span>01</span>图片转图纸</button>
        <button class="mode" data-mode="create"><span>02</span>自由创作</button>
      </section>

      <section class="workspace">
        <aside class="controls">
          <div class="panel image-panel">
            <div class="panel-heading"><h2>导入图片</h2><span>IMAGE</span></div>
            <label class="upload-zone" id="uploadZone" for="imageInput"><input id="imageInput" type="file" accept="image/*" /><span class="upload-icon">↑</span><strong>选择一张图片</strong><small>JPG、PNG 或 WEBP 格式</small></label>
            <div class="preview-wrap hidden" id="previewWrap"><img id="imagePreview" alt="上传的原图预览" /><button id="removeImage" aria-label="移除图片">×</button></div>
          </div>

          <div class="panel">
            <div class="panel-heading"><h2>图纸规格</h2><span>SIZE</span></div>
            <div class="size-row"><label>宽 <input id="gridWidth" type="number" min="16" max="200" value="64" /></label><i>×</i><label>高 <input id="gridHeight" type="number" min="16" max="200" value="64" /></label></div>
            <div class="preset-row"><button class="selected" data-size="64">64 × 64</button><button data-size="100">100 × 100</button><button data-size="150">150 × 150</button></div>
          </div>

          <div class="panel palette-panel">
            <div class="panel-heading"><h2>MARD 标准色板</h2><span id="paletteCount">221 色</span></div>
            <div class="palette-set-toggle" role="group" aria-label="色卡范围">
              <button class="active" data-palette-size="221" aria-pressed="true">221 色</button>
              <button data-palette-size="291" aria-pressed="false">291 色</button>
            </div>
            <div class="palette" id="palette"></div>
          </div>
        </aside>

        <section class="studio">
          <div class="canvas-toolbar"><div><strong id="projectTitle">未命名图纸</strong><small id="gridInfo">32 × 32 格</small></div><div class="tool-buttons"><button id="undoBtn" aria-label="撤销" data-tooltip="撤销"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7H4v5"/><path d="M4 7l6 6"/><path d="M20 17a7 7 0 0 0-12-5"/></svg></button><button id="redoBtn" aria-label="重做" data-tooltip="向后一步" disabled><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 7h5v5"/><path d="M20 7l-6 6"/><path d="M4 17a7 7 0 0 1 12-5"/></svg></button><button id="gridBtn" class="active" aria-label="网格" data-tooltip="网格">▦</button><button id="zoomOut" aria-label="缩小" data-tooltip="缩小">−</button><span id="zoomLabel">100%</span><button id="zoomIn" aria-label="放大" data-tooltip="放大">+</button></div></div>
          <div class="canvas-stage" id="canvasStage"><canvas id="beadCanvas" width="640" height="640"></canvas><div class="empty-state" id="emptyState"><div class="spark">✦</div><h2>准备开始创作</h2><p>上传一张图片，或选择「自由创作」<br/>在画布上绘制你的第一颗拼豆。</p><button class="primary-button" id="startCreate">开始自由创作</button></div></div>
          <div class="canvas-footer"><span><i class="status-dot"></i><b id="usedColors">0</b> 种颜色已使用</span><span><b id="beadTotal">0</b> 颗拼豆</span></div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="palette.js"></script>
    <script src="app.js"></script>
  </body>
</html>
